<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đấu trường kéo co kiến thức - Trực quan, kịch tính và đầy trí tuệ.">
  <meta property="og:title" content="Đấu Trường Kéo Co Kiến Thức">
  <meta property="og:description" content="Đấu trường kéo co kiến thức - Trực quan, kịch tính và đầy trí tuệ.">
  <meta property="og:image" content="https://vitinhthanhphat-png.github.io/knowledge-tug-of-war/cover_game.jpg">
  <title>Knowledge Tug of War Sandbox</title>
  <link rel="icon" type="image/png" href="./favicon_game.png">
  
  <!-- Load fonts in host for performance and caching -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Grotesk:wght@300..700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      min-height: 100vh;
      overflow: hidden;
    }
    .portrait-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #111c2d;
      z-index: 99999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      padding: 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      box-sizing: border-box;
    }
    @media (orientation: portrait) and (max-width: 900px) {
      .portrait-overlay {
        display: flex;
      }
      .game-container-wrapper {
        display: none !important;
      }
    }
    .rotate-icon {
      font-size: 64px !important;
      margin-bottom: 24px;
      animation: rotatePhone 2s infinite ease-in-out;
    }
    .portrait-title {
      font-size: 24px;
      font-weight: 800;
      color: #22c55e;
      margin-bottom: 16px;
      margin-top: 0;
    }
    .portrait-desc {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      max-width: 300px;
      line-height: 1.5;
      margin: 0;
    }
    @keyframes rotatePhone {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
      100% { transform: rotate(90deg); }
    }
  </style>
</head>
<body>
  
  <div class="portrait-overlay">
    <span class="material-symbols-outlined rotate-icon">screen_rotation</span>
    <h2 class="portrait-title">Vui lòng xoay ngang điện thoại</h2>
    <p class="portrait-desc">Trải nghiệm Đấu Trường Kéo Co Kiến Thức tốt nhất khi màn hình nằm ngang.</p>
  </div>

  <div class="w-full h-[100vh] game-container-wrapper">

    
    <!-- Custom HTML Web Component -->
    <knowledge-tug-of-war 
      theme="kinetic-academy"
      default-questions='[{"id":"q1","question":"Which algorithm is used to hash passwords in this widget?","options":["MD5","SHA-256","Bcrypt","AES"],"answer_hash":"bcf0bd8e4703675ff11e92b2d545757efe64d34cc4779780f1520cdeae3db93e","salt":"my-salt-1"}]'
    ></knowledge-tug-of-war>
  </div>

  <!-- Vite entrypoint for local dev server -->
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
